services:
  postgres-primary:
    image: postgres:15
    container_name: postgres-primary
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - primary-data:/var/lib/postgresql/data
      - ./primary-init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./pg_hba.conf:/etc/postgresql/pg_hba.conf
    command: |
      postgres
      -c wal_level=replica
      -c max_wal_senders=10
      -c max_replication_slots=10
      -c hot_standby=on
      -c hba_file=/etc/postgresql/pg_hba.conf
    networks:
      - postgres-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-replica1:
    image: postgres:15
    container_name: postgres-replica1
    environment:
      POSTGRES_PASSWORD: password123
      PGDATA: /var/lib/postgresql/data
    ports:
      - "5433:5432"
    volumes:
      - replica1-data:/var/lib/postgresql/data
      - ./replica-entrypoint.sh:/usr/local/bin/replica-entrypoint.sh
    depends_on:
      postgres-primary:
        condition: service_healthy
    entrypoint: ["bash", "/usr/local/bin/replica-entrypoint.sh"]
    networks:
      - postgres-network

  postgres-replica2:
    image: postgres:15
    container_name: postgres-replica2
    environment:
      POSTGRES_PASSWORD: password123
      PGDATA: /var/lib/postgresql/data
    ports:
      - "5434:5432"
    volumes:
      - replica2-data:/var/lib/postgresql/data
      - ./replica-entrypoint.sh:/usr/local/bin/replica-entrypoint.sh
    depends_on:
      postgres-primary:
        condition: service_healthy
    entrypoint: ["bash", "/usr/local/bin/replica-entrypoint.sh"]
    networks:
      - postgres-network

volumes:
  primary-data:
  replica1-data:
  replica2-data:

networks:
  postgres-network:
    driver: bridge
